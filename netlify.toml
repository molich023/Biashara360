
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev"
  port = 5173
  targetPort = 5173

# ─── SECURITY HEADERS ON ALL ROUTES ──────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(self), microphone=(self), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.netlify.app https://*.neon.tech wss://*.neon.tech https://sandbox.safaricom.co.ke https://api.safaricom.co.ke; worker-src 'self'"

# ─── SPA FALLBACK — ALL ROUTES SERVE index.html ──────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── API ROUTES GO TO NETLIFY FUNCTIONS ──────────────────────
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
